services:
  api:
    build: .
    env_file: [.env]
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 5
  postgres:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: stock_hunter, POSTGRES_PASSWORD: stock_hunter, POSTGRES_DB: stock_hunter}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_hunter"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: [postgres_data:/var/lib/postgresql/data]
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: [redis_data:/data]
volumes:
  postgres_data:
  redis_data:
